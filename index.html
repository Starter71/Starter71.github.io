<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Webseite</title>
    <style>
        /* Sorgt dafür, dass das Hintergrundbild den ganzen Bildschirm füllt */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url('BuergerserviceOverview.jpg'); /* Stelle sicher, dass dein Bild so heißt */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Der anklickbare Bereich (Hotspot) */
        .hotspot {
            position: absolute;
            /* Hier kannst du die Position anpassen */
            top: 50%; 
            left: 25%;
            /* Größe des Bereichs */
            width: 150px; 
            height: 150px;
            display: block;
            /* Optional: Zeige einen Rahmen, während du die Position testest */
            /* border: 2px solid white; */
            /* cursor: pointer; sorgt dafür, dass sich der Mauszeiger ändert */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Der Link-Bereich, der zur zweiten Seite führt -->
    <a href="DigitalChannel.html" class="hotspot"></a>

</body>
</html>
